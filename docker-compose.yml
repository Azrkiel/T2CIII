services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app:ro
      - backend_tmp_parts:/app/tmp_parts
      - backend_telemetry:/app/telemetry_logs
    read_only: true
    tmpfs:
      - /tmp:size=256M
    env_file:
      - .env

  frontend:
    build:
      context: ./frontend
    ports:
      - "8501:8501"
    volumes:
      - ./frontend:/app:ro
    depends_on:
      - backend

volumes:
  backend_tmp_parts:
  backend_telemetry:
